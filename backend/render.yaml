# Render Blueprint — bir tiklamayla deploy.
# Render Dashboard > New > Blueprint > bu repoyu sec.
#
# Iki servis + bir veritabani:
#   1) akilli-tarim-backend   (Node)     — ESP32 + frontend ile konusur
#   2) akilli-tarim-algo      (Python)   — sulama algoritmasi (Flask)
#   3) akilli-tarim-db        (Postgres) — olcum + karar gecmisi (kalici)
# Node servis ALGO_URL ile Python'a, DATABASE_URL ile Postgres'e baglanir.

# ── Veritabani (Render Postgres, free plan) ──────────────────
databases:
  - name: akilli-tarim-db
    plan: free
    # databaseName / user otomatik atanir; istersen sabitleyebilirsin.

services:
  - type: web
    name: akilli-tarim-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: INGEST_TOKEN
        generateValue: true   # Render rastgele bir token uretir; ESP32'ye ayni degeri yaz
      - key: ALGO_URL
        fromService:
          name: akilli-tarim-algo
          type: web
          property: hostport   # https://<algo-servis>.onrender.com olarak gelir
      - key: DATABASE_URL
        fromDatabase:
          name: akilli-tarim-db
          property: connectionString   # Postgres baglanti dizesi otomatik enjekte edilir

  - type: web
    name: akilli-tarim-algo
    runtime: python
    plan: free
    rootDir: backend/algo_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    # Algoritma dosyasi ./algorithm/ altinda bundle'li; ekstra ALGO_DIR gerekmez.
