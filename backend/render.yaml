# Render Blueprint — bir tiklamayla deploy.
# Render Dashboard > New > Blueprint > bu repoyu sec.
#
# Iki servis + bir veritabani:
#   1) akilli-tarim-backend   (Node)     — ESP32 + frontend ile konusur
#   2) akilli-tarim-algo      (Python)   — sulama algoritmasi (Flask)
#   3) akilli-tarim-db        (Postgres) — olcum + karar gecmisi (kalici)
# Node servis ALGO_URL ile Python'a, DATABASE_URL ile Postgres'e baglanir.

# ── Veritabani (Render Postgres, free plan) ──────────────────
databases:
  - name: akilli-tarim-db
    plan: free
    # databaseName / user otomatik atanir; istersen sabitleyebilirsin.

services:
  - type: web
    name: kmt_bitirme1
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      # NOT: INGEST_TOKEN kaldirildi. ESP32 kodu token gondermiyor; token set
      # olunca /ingest 401 doner ve sensor verisi reddedilir. Prototip icin
      # token kullanilmiyor. Ileride ESP32'ye x-token header eklenirse acilir.
      # NOT: fromService + property:hostport ic ag adresi (akilli-tarim-algo:10000)
      # dondurup DNS hatasina yol acti. Sabit dis URL kullaniyoruz.
      - key: ALGO_URL
        value: https://akilli-tarim-algo.onrender.com
      - key: DATABASE_URL
        # fromDatabase connectionString internal host verir; Blueprint sync sonrasi
        # DNS hatasi olmasin diye external Postgres URL sabitlenir.
        value: postgresql://akilli_tarim_db_user:U5acN5uYpQMTjclcuL5zG9tlKc94FmT1@dpg-d8oo8ccm0tmc73cvod20-a.oregon-postgres.render.com/akilli_tarim_db

  - type: web
    name: akilli-tarim-algo
    runtime: python
    plan: free
    rootDir: backend/algo_service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    # Algoritma dosyasi ./algorithm/ altinda bundle'li; ekstra ALGO_DIR gerekmez.
